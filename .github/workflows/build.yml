name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "11.0.x"
  DOTNET_CHANNEL: "preview"
  NODE_VERSION: "24"

jobs:
  build-svelte:
    name: Build Svelte frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/ME221Dashboard/SvelteApp/package-lock.json

      - run: npm ci
        working-directory: src/ME221Dashboard/SvelteApp

      - run: npm run build
        working-directory: src/ME221Dashboard/SvelteApp

      - uses: actions/upload-artifact@v4
        with:
          name: svelte-wwwroot
          path: src/ME221Dashboard/wwwroot/
          retention-days: 1

  build-android:
    name: Android (arm64)
    needs: build-svelte
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: svelte-wwwroot
          path: src/ME221Dashboard/wwwroot/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_CHANNEL }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore MAUI workloads
        run: dotnet workload restore src/ME221Dashboard/ME221Dashboard.csproj

      - run: >
          dotnet build src/ME221Dashboard/ME221Dashboard.csproj
          -f net11.0-android37.0
          -c Release
          -p:EnableWindowsTargeting=true

      - uses: actions/upload-artifact@v4
        with:
          name: me221-android-arm64
          path: src/ME221Dashboard/bin/Release/net11.0-android37.0/*.apk
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows
    needs: build-svelte
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: svelte-wwwroot
          path: src/ME221Dashboard/wwwroot/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_CHANNEL }}

      - name: Restore MAUI workloads
        run: dotnet workload restore src/ME221Dashboard/ME221Dashboard.csproj

      - run: >
          dotnet build src/ME221Dashboard/ME221Dashboard.csproj
          -f net11.0-windows10.0.19041.0
          -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: me221-windows
          path: src/ME221Dashboard/bin/Release/net11.0-windows10.0.19041.0/
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: macOS (Catalyst)
    needs: build-svelte
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: svelte-wwwroot
          path: src/ME221Dashboard/wwwroot/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_CHANNEL }}

      - name: Select Xcode 26.6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      - name: Restore MAUI workloads
        run: dotnet workload restore src/ME221Dashboard/ME221Dashboard.csproj

      - run: >
          dotnet build src/ME221Dashboard/ME221Dashboard.csproj
          -f net11.0-maccatalyst
          -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: me221-macos
          path: src/ME221Dashboard/bin/Release/net11.0-maccatalyst/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_CHANNEL }}

      # Run tests on individual projects to avoid restoring the MAUI project
      # (which requires platform-specific workload packs).
      - run: |
          dotnet test tests/ME221.Comms.Tests/ME221.Comms.Tests.csproj -c Release --verbosity minimal
          dotnet test tests/ME221.Data.Tests/ME221.Data.Tests.csproj -c Release --verbosity minimal